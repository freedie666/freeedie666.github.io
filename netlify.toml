[build]
  publish = "public"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/sounds"
  to = "/.netlify/functions/sounds"
  status = 200

[[redirects]]
  from = "/api/upload"
  to = "/.netlify/functions/upload"
  status = 200

[[redirects]]
  from = "/api/delete"
  to = "/.netlify/functions/delete"
  status = 200

[[redirects]]
  from = "/api/audio/:id"
  to = "/.netlify/functions/audio?id=:id"
  status = 200
