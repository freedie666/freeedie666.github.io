<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VAULT-TEC SOUNDBOARD</title>
<style>
  :root {
    --green: #3cff7a;
    --green-dim: #1f9c4a;
    --green-deep: #0a3b1e;
    --bg: #04140a;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    min-height: 100%;
    background: #03100a;
    color: #3cff7a;
    font-family: "Courier New", "Lucida Console", Monaco, monospace;
  }
  body {
    background:
      radial-gradient(circle at 50% 0%, rgba(60,255,122,0.10), transparent 60%),
      #03100a;
    text-shadow: 0 0 4px rgba(60,255,122,0.55);
    overflow-x: hidden;
  }

  /* CRT scanlines + flicker overlay */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 9999;
    background: repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,0) 0px,
      rgba(0,0,0,0) 2px,
      rgba(0,0,0,0.28) 3px,
      rgba(0,0,0,0.28) 4px
    );
  }
  body::after {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 9998;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.55) 100%);
    animation: flicker 4s infinite;
  }
  @keyframes flicker {
    0%, 96%, 100% { opacity: 1; }
    97% { opacity: 0.85; }
    98% { opacity: 0.97; }
  }

  header {
    text-align: center;
    padding: 22px 16px 6px;
    position: relative;
    z-index: 1;
  }
  header h1 {
    margin: 0;
    font-size: clamp(20px, 4vw, 40px);
    letter-spacing: 6px;
    font-weight: bold;
  }
  header .sub {
    margin-top: 6px;
    font-size: 12px;
    letter-spacing: 3px;
    color: var(--green-dim);
  }

  #status {
    text-align: center;
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--green-dim);
    min-height: 16px;
    margin: 4px 0 10px;
    position: relative;
    z-index: 1;
  }

  /* Soundboard grid */
  #board {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 14px;
    padding: 10px 18px 120px;
    max-width: 1500px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }
  .tile {
    position: relative;
    border: 2px solid var(--green-dim);
    background: linear-gradient(180deg, rgba(60,255,122,0.06), rgba(60,255,122,0.02));
    color: var(--green);
    border-radius: 6px;
    min-height: 110px;
    padding: 16px 12px;
    font-family: inherit;
    font-size: 15px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    word-break: break-word;
    transition: transform 0.05s ease, box-shadow 0.12s ease, background 0.12s ease;
    text-shadow: inherit;
    box-shadow: inset 0 0 14px rgba(60,255,122,0.08);
  }
  .tile:hover {
    background: linear-gradient(180deg, rgba(60,255,122,0.16), rgba(60,255,122,0.06));
    box-shadow: 0 0 18px rgba(60,255,122,0.35), inset 0 0 14px rgba(60,255,122,0.18);
  }
  .tile:active, .tile.playing {
    transform: scale(0.97);
    background: rgba(60,255,122,0.30);
    color: #03100a;
    text-shadow: none;
    box-shadow: 0 0 26px rgba(60,255,122,0.6);
  }
  .tile .del {
    position: absolute;
    top: 4px;
    right: 6px;
    font-size: 14px;
    line-height: 1;
    color: var(--green-dim);
    opacity: 0;
    transition: opacity 0.12s;
    padding: 2px 4px;
  }
  body.admin-on .tile .del { opacity: 0.75; }
  .tile .del:hover { color: #ff5a5a; opacity: 1; }

  .empty {
    grid-column: 1 / -1;
    text-align: center;
    color: var(--green-dim);
    padding: 60px 20px;
    font-size: 14px;
    letter-spacing: 2px;
  }

  /* Admin toggle button (bottom) */
  #admin-toggle {
    position: fixed;
    bottom: 16px;
    right: 16px;
    z-index: 50;
    background: #03100a;
    color: var(--green);
    border: 2px solid var(--green-dim);
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 2px;
    padding: 10px 14px;
    border-radius: 6px;
    cursor: pointer;
    text-shadow: inherit;
    box-shadow: 0 0 12px rgba(60,255,122,0.25);
  }
  #admin-toggle:hover { background: rgba(60,255,122,0.12); }

  /* Admin panel */
  #admin {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(2,10,6,0.94);
    overflow-y: auto;
    padding: 30px 16px 60px;
  }
  #admin.open { display: block; }
  .panel {
    max-width: 560px;
    margin: 0 auto;
    border: 2px solid var(--green-dim);
    border-radius: 8px;
    background: #051a0e;
    padding: 22px;
    box-shadow: 0 0 30px rgba(60,255,122,0.25);
  }
  .panel h2 {
    margin: 0 0 4px;
    letter-spacing: 4px;
    font-size: 18px;
  }
  .panel .hint { color: var(--green-dim); font-size: 11px; letter-spacing: 1px; margin-bottom: 18px; }
  .tabs { display: flex; gap: 8px; margin-bottom: 18px; }
  .tabs button {
    flex: 1;
    background: transparent;
    border: 2px solid var(--green-dim);
    color: var(--green-dim);
    font-family: inherit;
    letter-spacing: 2px;
    padding: 10px;
    cursor: pointer;
    border-radius: 6px;
  }
  .tabs button.active { color: #03100a; background: var(--green); border-color: var(--green); }
  .tabpane { display: none; }
  .tabpane.active { display: block; }
  label { display: block; font-size: 12px; letter-spacing: 2px; margin: 14px 0 6px; }
  input[type="text"], input[type="file"] {
    width: 100%;
    background: #03100a;
    border: 2px solid var(--green-dim);
    color: var(--green);
    font-family: inherit;
    padding: 10px;
    border-radius: 6px;
    font-size: 14px;
  }
  .btn {
    width: 100%;
    margin-top: 18px;
    background: var(--green);
    color: #03100a;
    border: none;
    font-family: inherit;
    font-weight: bold;
    letter-spacing: 3px;
    padding: 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
  }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn.ghost { background: transparent; color: var(--green-dim); border: 2px solid var(--green-dim); }
  .rec-status { text-align: center; letter-spacing: 2px; margin: 14px 0; min-height: 18px; font-size: 13px; }
  .rec-dot { color: #ff4d4d; animation: blink 1s steps(2) infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  #admin-close {
    position: absolute;
    top: 18px;
    right: 22px;
    background: transparent;
    border: none;
    color: var(--green);
    font-size: 26px;
    cursor: pointer;
    font-family: inherit;
  }
  .feedback { font-size: 12px; letter-spacing: 1px; margin-top: 10px; min-height: 16px; }
  .feedback.err { color: #ff6a6a; }
</style>
</head>
<body>
  <header>
    <h1>VAULT-TEC SOUNDBOARD</h1>
    <div class="sub">PIP-BOY 3000 · AUDIO INTERFACE</div>
  </header>
  <div id="status">INITIALIZING…</div>

  <main id="board"></main>

  <button id="admin-toggle">▸ ADMIN</button>

  <!-- Admin panel -->
  <div id="admin">
    <div class="panel">
      <button id="admin-close" title="Close">×</button>
      <h2>ADMIN TERMINAL</h2>
      <div class="hint">ADD OR REMOVE AUDIO CLIPS · ROBCO INDUSTRIES (TM)</div>

      <div class="tabs">
        <button data-tab="upload" class="active">UPLOAD</button>
        <button data-tab="record">RECORD</button>
      </div>

      <!-- Upload tab -->
      <div class="tabpane active" id="tab-upload">
        <label for="up-name">CLIP NAME</label>
        <input type="text" id="up-name" placeholder="e.g. War never changes" />
        <label for="up-file">AUDIO FILE (.mp3 / .wav / .ogg)</label>
        <input type="file" id="up-file" accept="audio/*" />
        <button class="btn" id="up-submit">▸ SAVE CLIP</button>
        <div class="feedback" id="up-feedback"></div>
      </div>

      <!-- Record tab -->
      <div class="tabpane" id="tab-record">
        <label for="rec-name">CLIP NAME</label>
        <input type="text" id="rec-name" placeholder="e.g. My voice line" />
        <div class="rec-status" id="rec-status">READY</div>
        <button class="btn" id="rec-toggle">● START RECORDING</button>
        <button class="btn ghost" id="rec-save" disabled>▸ SAVE RECORDING</button>
        <div class="feedback" id="rec-feedback"></div>
      </div>
    </div>
  </div>

<script>
const API = {
  list:   '/api/sounds',
  upload: '/api/upload',
  del:    '/api/delete',
  audio:  (id) => '/api/audio/' + id,
};

const boardEl  = document.getElementById('board');
const statusEl = document.getElementById('status');

// ---------- Soundboard ----------
async function loadSounds() {
  statusEl.textContent = 'LOADING SOUND BANK…';
  try {
    const res = await fetch(API.list);
    const data = await res.json();
    renderBoard(data.sounds || []);
    statusEl.textContent = (data.sounds || []).length + ' CLIP(S) LOADED · TAP A TILE TO PLAY';
  } catch (e) {
    statusEl.textContent = 'ERROR: COULD NOT REACH SOUND BANK';
  }
}

function renderBoard(sounds) {
  boardEl.innerHTML = '';
  if (!sounds.length) {
    const d = document.createElement('div');
    d.className = 'empty';
    d.textContent = 'NO CLIPS YET — OPEN ADMIN TO UPLOAD OR RECORD';
    boardEl.appendChild(d);
    return;
  }
  sounds.forEach((s) => {
    const tile = document.createElement('button');
    tile.className = 'tile';
    tile.textContent = s.name;

    tile.addEventListener('click', (e) => {
      if (e.target.classList.contains('del')) return;
      playSound(s.id, tile);
    });

    const del = document.createElement('span');
    del.className = 'del';
    del.textContent = '✕';
    del.title = 'Delete clip';
    del.addEventListener('click', (e) => {
      e.stopPropagation();
      deleteSound(s.id, s.name);
    });
    tile.appendChild(del);

    boardEl.appendChild(tile);
  });
}

// Fire-and-forget: new Audio each time so clips overlap freely.
function playSound(id, tile) {
  const audio = new Audio(API.audio(id));
  audio.play().catch(() => {});
  if (tile) {
    tile.classList.add('playing');
    audio.addEventListener('ended', () => tile.classList.remove('playing'));
    setTimeout(() => tile.classList.remove('playing'), 600);
  }
}

async function deleteSound(id, name) {
  if (!confirm('Delete "' + name + '"?')) return;
  try {
    await fetch(API.del, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id }),
    });
    loadSounds();
  } catch (e) {
    alert('Delete failed.');
  }
}

// ---------- Admin panel ----------
const adminEl = document.getElementById('admin');
document.getElementById('admin-toggle').addEventListener('click', () => {
  adminEl.classList.add('open');
  document.body.classList.add('admin-on');
});
document.getElementById('admin-close').addEventListener('click', () => {
  adminEl.classList.remove('open');
  document.body.classList.remove('admin-on');
});

// Tabs
document.querySelectorAll('.tabs button').forEach((btn) => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tabs button').forEach((b) => b.classList.remove('active'));
    document.querySelectorAll('.tabpane').forEach((p) => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
  });
});

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result); // data URL
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function saveClip(name, dataUrl, feedbackEl) {
  const res = await fetch(API.upload, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, data: dataUrl }),
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

// Upload tab
const upSubmit = document.getElementById('up-submit');
const upFeedback = document.getElementById('up-feedback');
upSubmit.addEventListener('click', async () => {
  const name = document.getElementById('up-name').value.trim();
  const file = document.getElementById('up-file').files[0];
  upFeedback.className = 'feedback';
  if (!name) { upFeedback.textContent = 'Enter a clip name.'; return; }
  if (!file) { upFeedback.textContent = 'Choose an audio file.'; return; }
  upSubmit.disabled = true;
  upFeedback.textContent = 'UPLOADING…';
  try {
    const dataUrl = await fileToBase64(file);
    await saveClip(name, dataUrl, upFeedback);
    upFeedback.textContent = 'SAVED ✓';
    document.getElementById('up-name').value = '';
    document.getElementById('up-file').value = '';
    loadSounds();
  } catch (e) {
    upFeedback.className = 'feedback err';
    upFeedback.textContent = 'Upload failed: ' + e.message;
  } finally {
    upSubmit.disabled = false;
  }
});

// Record tab
let mediaRecorder = null;
let recChunks = [];
let recBlobUrl = null;
let recDataUrl = null;
const recToggle = document.getElementById('rec-toggle');
const recSave = document.getElementById('rec-save');
const recStatus = document.getElementById('rec-status');
const recFeedback = document.getElementById('rec-feedback');

recToggle.addEventListener('click', async () => {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
    return;
  }
  recFeedback.className = 'feedback';
  recFeedback.textContent = '';
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    recChunks = [];
    mediaRecorder.ondataavailable = (e) => { if (e.data.size) recChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      stream.getTracks().forEach((t) => t.stop());
      const blob = new Blob(recChunks, { type: mediaRecorder.mimeType || 'audio/webm' });
      const reader = new FileReader();
      reader.onload = () => {
        recDataUrl = reader.result;
        recSave.disabled = false;
        recStatus.innerHTML = 'RECORDED ✓ — READY TO SAVE';
      };
      reader.readAsDataURL(blob);
      recToggle.textContent = '● START RECORDING';
    };
    mediaRecorder.start();
    recToggle.textContent = '■ STOP RECORDING';
    recStatus.innerHTML = '<span class="rec-dot">●</span> RECORDING…';
    recSave.disabled = true;
  } catch (e) {
    recFeedback.className = 'feedback err';
    recFeedback.textContent = 'Microphone access denied or unavailable.';
  }
});

recSave.addEventListener('click', async () => {
  const name = document.getElementById('rec-name').value.trim();
  recFeedback.className = 'feedback';
  if (!name) { recFeedback.textContent = 'Enter a clip name.'; return; }
  if (!recDataUrl) { recFeedback.textContent = 'Record something first.'; return; }
  recSave.disabled = true;
  recFeedback.textContent = 'SAVING…';
  try {
    await saveClip(name, recDataUrl);
    recFeedback.textContent = 'SAVED ✓';
    document.getElementById('rec-name').value = '';
    recDataUrl = null;
    recStatus.textContent = 'READY';
    loadSounds();
  } catch (e) {
    recFeedback.className = 'feedback err';
    recFeedback.textContent = 'Save failed: ' + e.message;
    recSave.disabled = false;
  }
});

// Init
loadSounds();
</script>
</body>
</html>
